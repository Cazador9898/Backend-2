spring.application.name=minimarket
# Configuración de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuración de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Rutas estándar de documentación OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Seguridad JWT (en producción usar variables de entorno)
app.jwt.secret=${JWT_SECRET:MinimarketPlusClaveSegura2026ConMasDe32Caracteres}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Respuestas de error legibles
server.error.include-message=always
services.notificaciones.url=${NOTIFICACIONES_URL:http://localhost:8081}
services.notificaciones.api-key=${NOTIFICACIONES_API_KEY:clave-interna-minimarket}
